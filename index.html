<script>
// 用 CONFIG 填入頁面內容
document.getElementById('dateDisplay').innerHTML = '📅 ' + CONFIG.eventDate;
document.getElementById('volunteerBtn').href = CONFIG.volunteerLink;
document.getElementById('sponsorBtn').href = CONFIG.sponsorLink;
document.getElementById('infoBtn').href = CONFIG.infoLink;
// 產生文章卡片
var container = document.getElementById('articlesContainer');
var hasHidden = false;
CONFIG.articles.forEach(function(a) {
  if (!a.show) { hasHidden = true; return; }
  var thumbStyle = a.image
    ? 'background-image:url(' + a.image + ');'
    : '';
  var thumbText = a.image ? '' : '圖片待更新';
  container.innerHTML += '<a class="article-card" href="' + a.link + '">'
    + '<div class="article-thumb" style="' + thumbStyle + '">' + thumbText + '</div>'
    + '<div class="article-body">'
    + '<div class="article-tag">' + a.tag + '</div>'
    + '<div class="article-title">' + a.title + '</div>'
    + '<div class="article-excerpt">' + a.excerpt + '</div>'
    + '</div></a>';
});
if (hasHidden) {
  container.innerHTML += '<div class="placeholder-note">更多報導，活動結束後刊出</div>';
}
</script>
